spring:
  application:
    name: mybatis-time-cost-demo
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

mybatis:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
